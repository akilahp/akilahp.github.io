<!DOCTYPE html> <!-- Use of html5 -->
<html lang="en">
  <head>
    <title>Akilah Parrish | Technical and Artistic Portfolio</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #03071e;
        color: #f8f9fa;
        line-height: 1.5;
        margin: 0;
      } 
      .header {
        background: linear-gradient(105deg, #03045e 0%, #0077b6 100%);
        padding: 50px 20px;
        text-align: justify;
        box-shadow: 0 4px 20px rgba(0,119,182,0.25);
        color: #ffffff
      }
      h1 {
        font-size: 2em;
        letter-spacing: -0.5px;
      }
      h2 {
        font-size: 2em;
        color: #00b4d8;
        border-bottom: 2px solid #0077b6;
        padding-bottom: 12px;
        letter-spacing: -0.5px;
      }

      .subtitle {
        color: #90e0ef;
        margin-top: 15px;
        font-size: 1em;
        font-weight: 700;
      }
      
      /*CONTACT-LINKS*/
      .contact-links {
        margin-top: 20px
      }

      /*Container*/
      .container {
        max-width: none;
        margin: 40px auto;
        padding: 0 20px;
      }
      .work {
        display: flex;
        flex-direction: columns;
        gap: 40px;
      }

      .art-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        gap: 25px;
        margin-top: 20px;
      }

      .art-box {
        background-color: #0a1128;
        border-radius: 10px;
        border: 1px solid #005f73;
        overflow: hidden;
      }

      .art-img {
        width: 100%;
        height: auto;
        display: block;
      }

      .art-name {
        font-weight: bold;
        font-size: 1.5em;
        color: #ffffff;
      }
      
    </style>
  </head>
  
  <body>
    <div class='header'>
      <h1>Akilah Parrish</h1>
      <div class="subtitle">Art Portfolio</div>
      <div class="contact-links">
          <p> A visual artist that aspires to be visual effects technical director and future vfx supervisor.</p>
      </div>
    </div>

    <div class="container">

      <section id="Art">
        <h2>Visual Development</h2>
        <div class="art-grid">
          <!--Mahoraga -->
          <div class="art-box">
            <img src="" alt=Mahoraga Anatomy Study>
          </div>

          <!--Groot-->
          <div class="art-box">
          </div>

          <!--Portraits-->
          <div class="art box">
          </div>
          
        </div>
    </div>
    
  </body>
</html>
